name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install validation tools
        run: sudo apt-get update && sudo apt-get install --yes python3-jsonschema shellcheck zstd

      - name: Check shell scripts
        run: |
          while IFS= read -r -d '' file; do
            if head -n 1 "$file" | grep -Eq '^#!.*(ba)?sh'; then
              shellcheck --severity=error "$file"
            fi
          done < <(find scripts image-builder -type f -print0)

      - name: Run release bundle tests
        run: python3 -m unittest discover -s tests -v

      - name: Check repository whitespace
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: git diff --check "$BASE_SHA" "$HEAD_SHA"
