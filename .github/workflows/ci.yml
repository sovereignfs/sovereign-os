name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install validation tools
        run: sudo apt-get update && sudo apt-get install --yes shellcheck zstd

      - name: Check shell scripts
        run: |
          while IFS= read -r -d '' file; do
            if head -n 1 "$file" | grep -Eq '^#!.*(ba)?sh'; then
              shellcheck --severity=error "$file"
            fi
          done < <(find scripts image-builder -type f -print0)

      - name: Run release bundle tests
        run: python3 -m unittest discover -s tests -v

      - name: Check repository whitespace
        run: git log -1 --check --oneline
