name: Build Raspberry Pi image

on:
  workflow_dispatch:
    inputs:
      version:
        description: SemVer without a leading v
        required: true
        type: string
      channel:
        description: Release channel
        required: true
        default: preview
        type: choice
        options:
          - preview
          - stable
      publish_draft_release:
        description: Publish the bundle as a draft GitHub release
        required: true
        default: false
        type: boolean
      build_update_candidate:
        description: Also package an unsigned installed-device update candidate
        required: true
        default: false
        type: boolean
      update_source_minimum:
        description: Minimum installed version accepted by the update candidate
        required: false
        default: ""
        type: string
      update_source_maximum_exclusive:
        description: Exclusive upper installed-version bound
        required: false
        default: "0.2.0"
        type: string
      update_key_id:
        description: Public key identifier expected when the candidate is signed offline
        required: false
        default: preview-local
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check host capacity
        run: |
          uname -a
          test "$(uname -m)" = aarch64
          docker version
          df -h .

      - name: Build image
        env:
          SOVEREIGN_VERSION: ${{ inputs.version }}
          SOVEREIGN_CHANNEL: ${{ inputs.channel }}
        run: ./scripts/build-sovereign-image.sh

      - name: Package release candidate
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_CHANNEL: ${{ inputs.channel }}
        run: |
          source_date_epoch=$(git show -s --format=%ct HEAD)
          ./scripts/create-release-bundle.py \
            --deploy-dir build/sovereign-image/deploy \
            --output-dir build/release \
            --version "$RELEASE_VERSION" \
            --channel "$RELEASE_CHANNEL" \
            --source-revision "$GITHUB_SHA" \
            --source-date-epoch "$source_date_epoch"
          cd build/release
          sha256sum --check SHA256SUMS

      - name: Package unsigned appliance update candidate
        if: inputs.build_update_candidate
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_CHANNEL: ${{ inputs.channel }}
          UPDATE_SOURCE_MINIMUM: ${{ inputs.update_source_minimum }}
          UPDATE_SOURCE_MAXIMUM_EXCLUSIVE: ${{ inputs.update_source_maximum_exclusive }}
          UPDATE_KEY_ID: ${{ inputs.update_key_id }}
        run: |
          test -n "$UPDATE_SOURCE_MINIMUM"
          source_date_epoch=$(git show -s --format=%ct HEAD)
          ./scripts/create-update-release.py \
            --version "$RELEASE_VERSION" \
            --channel "$RELEASE_CHANNEL" \
            --source-minimum "$UPDATE_SOURCE_MINIMUM" \
            --source-maximum-exclusive "$UPDATE_SOURCE_MAXIMUM_EXCLUSIVE" \
            --pihole-env image-builder/sovereign/pihole-image.env \
            --oci build/sovereign-image/evidence/oci/pihole-arm64.oci.tar \
            --output-dir build/update-release \
            --key-id "$UPDATE_KEY_ID" \
            --artifact-base-url "https://github.com/sovereignfs/sovereign-os/releases/download/v${RELEASE_VERSION}" \
            --notes-url "https://github.com/sovereignfs/sovereign-os/releases/tag/v${RELEASE_VERSION}" \
            --source-date-epoch "$source_date_epoch"

      - name: Upload image release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sovereign-os-${{ inputs.version }}-rpi5-arm64
          path: build/release/
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

      - name: Upload installed-device update artifact
        if: inputs.build_update_candidate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sovereign-update-${{ inputs.version }}-rpi5-arm64
          path: build/update-release/
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

      - name: Publish draft release
        if: inputs.publish_draft_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_CHANNEL: ${{ inputs.channel }}
        run: |
          gh release create "v${RELEASE_VERSION}" build/release/* \
            --draft \
            --target "$GITHUB_SHA" \
            --title "Sovereign OS ${RELEASE_VERSION} (${RELEASE_CHANNEL})" \
            --notes "Engineering image candidate. Raspberry Pi 5 hardware qualification and the Phase 01 release checklist remain required before publication."
