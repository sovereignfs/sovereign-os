name: Build Raspberry Pi image

on:
  workflow_dispatch:
    inputs:
      version:
        description: SemVer without a leading v
        required: true
        type: string
      channel:
        description: Release channel
        required: true
        default: preview
        type: choice
        options:
          - preview
          - stable
      publish_draft_release:
        description: Publish the bundle as a draft GitHub release
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check host capacity
        run: |
          uname -a
          test "$(uname -m)" = aarch64
          docker version
          df -h .

      - name: Build image
        run: ./scripts/build-sovereign-image.sh

      - name: Package release candidate
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_CHANNEL: ${{ inputs.channel }}
        run: |
          source_date_epoch=$(git show -s --format=%ct HEAD)
          ./scripts/create-release-bundle.py \
            --deploy-dir build/sovereign-image/deploy \
            --output-dir build/release \
            --version "$RELEASE_VERSION" \
            --channel "$RELEASE_CHANNEL" \
            --source-revision "$GITHUB_SHA" \
            --source-date-epoch "$source_date_epoch"
          cd build/release
          sha256sum --check SHA256SUMS

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sovereign-os-${{ inputs.version }}-rpi5-arm64
          path: build/release/
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

      - name: Publish draft release
        if: inputs.publish_draft_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_CHANNEL: ${{ inputs.channel }}
        run: |
          gh release create "v${RELEASE_VERSION}" build/release/* \
            --draft \
            --target "$GITHUB_SHA" \
            --title "Sovereign OS ${RELEASE_VERSION} (${RELEASE_CHANNEL})" \
            --notes "Engineering image candidate. Raspberry Pi 5 hardware qualification and the Phase 01 release checklist remain required before publication."
